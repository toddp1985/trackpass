<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<meta name="theme-color" content="#15140f" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Fairway Freedom" />
<title>Fairway Freedom Pass</title>
<style>
  :root{
    --ink:#15140f; --bg:#ffffff; --bg2:#f6f5f1; --card:#ffffff;
    --green:#1f7a4d; --green-dk:#11402a; --gold:#bE9b2e; --muted:#74726a; --line:#ececE6;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:'Helvetica Neue',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
    color:var(--ink);background:var(--bg);line-height:1.45;-webkit-font-smoothing:antialiased;
    overscroll-behavior-y:none;letter-spacing:-0.01em;
  }
  #app{max-width:480px;margin:0 auto;min-height:100%;background:var(--bg);position:relative}
  .screen{display:none;padding:0 0 104px;min-height:100vh;animation:fade .28s ease}
  .screen.active{display:block}
  @keyframes fade{from{opacity:.3;transform:translateY(8px)}to{opacity:1;transform:none}}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  h1,h2,h3{line-height:1.08;letter-spacing:-0.035em;font-weight:800}
  .pad{padding:0 20px}
  img{display:block;max-width:100%}

  /* Top bar */
  .topbar{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.9);backdrop-filter:blur(14px);
    padding:calc(var(--safe-top) + 16px) 20px 12px;display:flex;align-items:center;justify-content:space-between;
    border-bottom:1px solid var(--line)}
  .topbar .logo{font-size:18px;font-weight:800;letter-spacing:-.04em;display:flex;align-items:center;gap:7px}
  .topbar .logo .mk{width:24px;height:24px;border-radius:7px;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px}
  .topbar .credits{font-size:12.5px;font-weight:700;background:var(--bg2);border:1px solid var(--line);padding:7px 12px;border-radius:999px;display:flex;gap:6px;align-items:center}
  .topbar .credits b{color:var(--green)}

  /* Buttons */
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
    background:var(--ink);color:#fff;font-weight:700;font-size:16px;padding:17px;border-radius:999px;letter-spacing:-.01em;
    transition:transform .08s,opacity .2s}
  .btn:active{transform:scale(.98)}
  .btn.green{background:var(--green)}
  .btn.outline{background:transparent;border:1.6px solid var(--ink);color:var(--ink)}
  .btn.ghost{background:var(--bg2);color:var(--ink)}
  .btn[disabled]{opacity:.4;pointer-events:none}

  /* Hero (non-member) */
  .hero{position:relative;height:62vh;min-height:440px;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;color:#fff}
  .hero .photo{position:absolute;inset:0}
  .hero .scrim{position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,20,12,.05) 0%,rgba(10,20,12,.15) 45%,rgba(10,18,11,.82) 100%)}
  .hero .inner{position:relative;padding:0 22px 30px}
  .hero .eyebrow{font-size:11px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:#e9d8a6;margin-bottom:12px}
  .hero h1{font-size:42px;font-weight:800;letter-spacing:-.045em;line-height:.98}
  .hero p{font-size:15.5px;color:#eef2ec;margin-top:12px;max-width:380px;letter-spacing:-.005em}
  .hero .price{display:flex;align-items:baseline;gap:8px;margin-top:18px;font-weight:600;font-size:14px;color:#dfe7df}
  .hero .price b{font-size:30px;font-weight:800;color:#fff;letter-spacing:-.04em}

  /* Sections */
  .section{padding:26px 20px 6px}
  .section .eyebrow{font-size:11px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
  .section h2{font-size:26px;margin-top:8px}
  .section .sub{color:var(--muted);font-size:14.5px;margin-top:7px;letter-spacing:-.005em}

  /* How-it-works steps */
  .steps{display:grid;gap:12px;margin-top:16px}
  .step{display:flex;gap:14px;align-items:flex-start}
  .step .num{width:30px;height:30px;border-radius:50%;background:var(--ink);color:#fff;font-weight:800;font-size:14px;
    display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .step b{font-size:15.5px}
  .step p{font-size:14px;color:var(--muted);margin-top:2px}

  /* Escrow split */
  .split{display:flex;border-radius:16px;overflow:hidden;margin-top:16px;border:1px solid var(--line)}
  .split .seg{padding:18px 16px}
  .split .take{flex:15;background:var(--bg2);min-width:96px}
  .split .escrow{flex:85;background:var(--green-dk);color:#fff}
  .split .pct{font-size:24px;font-weight:800;letter-spacing:-.04em}
  .split .amt{font-size:12.5px;opacity:.85;margin-top:2px}
  .split .lbl{font-size:11.5px;font-weight:600;margin-top:10px;opacity:.92}

  /* Membership card (ClassPass-style) */
  .memcard{position:relative;border-radius:22px;overflow:hidden;color:#fff;padding:22px;
    background:linear-gradient(135deg,#16402a 0%,#1f7a4d 130%);box-shadow:0 16px 36px rgba(17,64,42,.28)}
  .memcard .glow{position:absolute;right:-40px;top:-60px;width:180px;height:180px;border-radius:50%;
    background:radial-gradient(circle,rgba(233,216,166,.5),transparent 65%)}
  .memcard .top{display:flex;justify-content:space-between;align-items:flex-start;position:relative}
  .memcard .tier{font-size:10.5px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:#e9d8a6}
  .memcard .nm{font-size:22px;font-weight:800;margin-top:6px;letter-spacing:-.03em}
  .memcard .id{font-family:ui-monospace,Menlo,monospace;font-size:12px;color:#cfe6d8;margin-top:4px;letter-spacing:.06em}
  .memcard .qr{width:58px;height:58px;border-radius:11px;background:#fff;padding:6px}
  .memcard .foot{display:flex;gap:22px;margin-top:22px;position:relative}
  .memcard .foot .k{font-size:11px;color:#bcd6c6}
  .memcard .foot .v{font-size:18px;font-weight:800;margin-top:1px;letter-spacing:-.03em}

  /* Value progress */
  .progress{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;margin-top:14px}
  .progress .lab{display:flex;justify-content:space-between;font-size:13px;font-weight:700}
  .vbar{margin-top:10px;height:10px;border-radius:6px;background:var(--bg2);overflow:hidden}
  .vbar>span{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,var(--green),var(--gold));transition:width .6s}

  /* Search & chips */
  .searchwrap{padding:14px 20px 8px;position:sticky;top:0;background:var(--bg);z-index:20}
  .searchwrap .field{display:flex;align-items:center;gap:10px;background:var(--bg2);border-radius:14px;padding:13px 15px}
  .searchwrap input{flex:1;border:none;background:none;font-size:15.5px;color:var(--ink);outline:none}
  .chips{display:flex;gap:9px;overflow-x:auto;padding:2px 20px 14px;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:none;font-size:13.5px;font-weight:600;padding:9px 16px;border-radius:999px;background:#fff;border:1.4px solid var(--line);color:var(--muted)}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}

  /* Course cards — photo-forward */
  .courses{display:grid;gap:20px;padding:6px 20px}
  .ccard{background:var(--card);border-radius:20px;overflow:hidden;border:1px solid var(--line);
    box-shadow:0 6px 22px rgba(20,20,15,.06);transition:transform .1s}
  .ccard:active{transform:scale(.99)}
  .ccard .photo{position:relative;aspect-ratio:16/10;overflow:hidden}
  .ccard .photo .sun{position:absolute;right:16%;top:18%;width:46px;height:46px;border-radius:50%;
    background:radial-gradient(circle,#fff7d6,rgba(255,247,214,.1) 70%)}
  .ccard .photo .hill{position:absolute;left:-10%;right:-10%;bottom:-30%;height:62%;border-radius:50% 50% 0 0;background:rgba(255,255,255,.10)}
  .badge{position:absolute;top:12px;right:12px;font-size:12px;font-weight:800;padding:7px 11px;border-radius:999px;
    background:rgba(255,255,255,.92);backdrop-filter:blur(6px);color:var(--ink);letter-spacing:-.01em}
  .badge.used{background:rgba(20,20,15,.62);color:#fff}
  .heart{position:absolute;top:11px;left:12px;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.92);
    display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--ink)}
  .ccard .body{padding:15px 16px 17px}
  .ccard .nm{font-size:18px;font-weight:800;letter-spacing:-.03em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ccard .loc{font-size:13.5px;color:var(--muted);margin-top:3px}
  .ccard .meta{display:flex;align-items:center;gap:12px;margin-top:11px;font-size:13.5px;font-weight:600}
  .ccard .meta .star{color:var(--ink)}
  .ccard .meta .dot{color:var(--line)}
  .ccard .meta .fee{color:var(--muted);font-weight:600}
  .ccard .meta .free{margin-left:auto;color:var(--green);font-weight:700}

  /* Horizontal featured rail */
  .rail{display:flex;gap:14px;overflow-x:auto;padding:14px 20px 6px;scrollbar-width:none}
  .rail::-webkit-scrollbar{display:none}
  .rail .ccard{flex:none;width:230px}

  /* Sheet */
  .sheet-bg{position:fixed;inset:0;background:rgba(15,18,14,.55);z-index:40;display:none;align-items:flex-end;justify-content:center}
  .sheet-bg.open{display:flex;animation:fade .2s}
  .sheet{background:var(--bg);width:100%;max-width:480px;border-radius:24px 24px 0 0;max-height:92vh;overflow-y:auto;
    animation:slideup .3s cubic-bezier(.2,.8,.2,1);padding-bottom:calc(20px + var(--safe-bottom))}
  @keyframes slideup{from{transform:translateY(100%)}to{transform:none}}
  .sheet .shphoto{position:relative;height:200px;overflow:hidden}
  .sheet .shphoto .grab{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:42px;height:5px;border-radius:3px;background:rgba(255,255,255,.7);z-index:2}
  .sheet .shphoto .close{position:absolute;top:14px;right:14px;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.92);display:flex;align-items:center;justify-content:center;font-size:18px;z-index:2}
  .sheet .shbody{padding:18px 20px 8px}
  .sheet .ttl{font-size:25px;font-weight:800;letter-spacing:-.035em}
  .sheet .loc2{color:var(--muted);font-size:14.5px;margin-top:4px;display:flex;align-items:center;gap:6px}
  .sheet .blurb{font-size:15px;color:#3a3a32;margin-top:14px;line-height:1.55}
  .dstats{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin:18px 0}
  .dstat{background:var(--bg2);border-radius:14px;padding:15px}
  .dstat .n{font-size:22px;font-weight:800;letter-spacing:-.03em}
  .dstat .l{font-size:12px;color:var(--muted);margin-top:2px}
  .formfield{margin-top:14px}
  .formfield label{font-size:12.5px;font-weight:700;color:var(--muted)}
  .formfield input{width:100%;padding:15px;border:1.4px solid var(--line);border-radius:13px;font-size:16px;margin-top:6px;outline:none}
  .formfield input:focus{border-color:var(--ink)}
  .ribbon{display:flex;justify-content:space-between;align-items:center;background:var(--bg2);border-radius:14px;padding:15px 16px;margin-top:18px}
  .ribbon .big{font-size:19px;font-weight:800;letter-spacing:-.03em}

  ul.clean{list-style:none;display:grid;gap:12px;margin-top:6px}
  ul.clean li{display:flex;gap:11px;align-items:flex-start;font-size:14.5px}
  ul.clean li::before{content:"✓";color:var(--green);font-weight:800;flex-shrink:0}

  .redeem-ok{text-align:center;padding:22px 20px 6px}
  .redeem-ok .ring{width:88px;height:88px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:44px;margin:0 auto 16px;animation:pop .45s cubic-bezier(.2,1.4,.4,1)}
  @keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}

  .note{font-size:12px;color:var(--muted);line-height:1.55}
  .center{text-align:center}
  .mt8{margin-top:8px}.mt14{margin-top:14px}.mt20{margin-top:20px}.mt24{margin-top:24px}

  .toast{position:fixed;left:50%;bottom:88px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;
    padding:13px 20px;border-radius:14px;font-size:14px;font-weight:600;opacity:0;pointer-events:none;transition:.3s;z-index:60;max-width:90%;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* Tab bar */
  .tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:35;
    background:rgba(255,255,255,.95);backdrop-filter:blur(16px);border-top:1px solid var(--line);
    display:flex;padding:9px 6px calc(9px + var(--safe-bottom))}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:5px 0;color:#b4b2aa;font-size:10.5px;font-weight:700;letter-spacing:0}
  .tab .ic{font-size:20px;line-height:1;filter:grayscale(1) opacity(.6)}
  .tab.on{color:var(--ink)}
  .tab.on .ic{filter:none}

  /* Indy-Pass-style stats band (renders below the hero, all screen sizes) */
  .statband{ display:grid; grid-template-columns:repeat(3,1fr); background:var(--ink); color:#fff; }
  .statband .s{ padding:20px 12px; text-align:center; border-right:1px solid rgba(255,255,255,.1); }
  .statband .s:last-child{ border-right:none; }
  .statband .s b{ display:block; font-size:22px; font-weight:800; letter-spacing:-.03em; }
  .statband .s span{ font-size:11.5px; color:#b8c6bd; }

  /* desktop top nav — hidden on mobile (mobile uses the bottom tab bar) */
  .topnav{ display:none; }

  /* ============ RESPONSIVE: real desktop layout (not a phone frame) ============ */
  @media (min-width: 860px){
    #app{ max-width:none; box-shadow:none; }
    .tabbar, .topbar{ display:none; }                 /* desktop uses the top nav */
    .screen{ padding-bottom:48px; min-height:auto; }
    .topnav{ display:block; position:sticky; top:0; z-index:50; background:rgba(255,255,255,.93);
      backdrop-filter:blur(14px); border-bottom:1px solid var(--line); }
    .tn-inner{ max-width:1160px; margin:0 auto; display:flex; align-items:center; gap:8px; padding:13px 28px; }
    .tn-logo{ font-size:19px; font-weight:800; letter-spacing:-.04em; display:flex; align-items:center; gap:8px; }
    .tn-logo .mk{ width:26px; height:26px; border-radius:8px; background:var(--ink); color:#fff; display:flex; align-items:center; justify-content:center; font-size:14px; }
    .tn-links{ display:flex; gap:4px; margin-left:18px; }
    .tn-link{ font-size:15px; font-weight:600; color:var(--muted); padding:9px 14px; border-radius:999px; }
    .tn-link:hover{ color:var(--ink); background:var(--bg2); }
    .tn-link.on{ color:var(--ink); }
    .tn-join{ margin-left:auto; width:auto; padding:11px 22px; font-size:15px; }
    /* full-bleed hero, headline aligned to the page container */
    .hero{ height:78vh; min-height:560px; max-height:800px; }
    .hero .inner{ max-width:1160px; margin:0 auto; width:100%; padding:0 28px 58px; }
    .hero h1{ font-size:72px; }
    .hero p{ font-size:18px; max-width:540px; }
    .hero .eyebrow{ font-size:12px; }
    /* center content blocks in a page container */
    .section, .searchwrap, .chips, .courses, .rail{ max-width:1160px; margin-left:auto; margin-right:auto; }
    .section{ padding:46px 28px 6px; }
    .section h2{ font-size:33px; }
    .searchwrap .field{ max-width:520px; }
    /* multi-column course grid */
    .courses{ grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); padding:12px 28px; gap:24px; }
    .steps{ grid-template-columns:repeat(3, 1fr); gap:28px; }
    .split{ max-width:720px; }
    .statband .s{ padding:30px 16px; } .statband .s b{ font-size:30px; } .statband .s span{ font-size:13px; }
    /* the standalone CTA pair shouldn't stretch full width */
    #screen-home .section:first-of-type{ max-width:380px; }
    /* sheets become centered modals on desktop */
    .sheet-bg{ align-items:center; }
    .sheet{ max-width:560px; border-radius:24px; max-height:86vh; }
    .sheet .shphoto{ border-radius:24px 24px 0 0; }
  }
</style>
</head>
<body>
<header class="topnav">
  <div class="tn-inner">
    <div class="tn-logo"><span class="mk">⛳</span> Fairway Freedom</div>
    <nav class="tn-links">
      <button class="tn-link on" data-tab="home">Home</button>
      <button class="tn-link" data-tab="courses">Courses</button>
      <button class="tn-link" data-tab="pass">My Pass</button>
    </nav>
    <button class="btn tn-join" id="tn-join">Join · $399</button>
  </div>
</header>
<div id="app">
  <section class="screen active" id="screen-home"></section>

  <section class="screen" id="screen-courses">
    <div class="topbar">
      <div class="logo"><span class="mk">⛳</span> Explore</div>
      <div class="credits" id="course-count">—</div>
    </div>
    <div class="searchwrap"><div class="field"><span>🔍</span><input id="search" type="search" placeholder="Search courses or city" autocomplete="off" /></div></div>
    <div class="chips" id="state-chips"></div>
    <div class="courses" id="course-list"></div>
    <p class="note pad mt14" style="padding-bottom:6px">Sample network for this demo · two 18-hole rounds per course, per season.</p>
  </section>

  <section class="screen" id="screen-pass">
    <div class="topbar"><div class="logo"><span class="mk">⛳</span> My Pass</div><div class="credits">Season <b>2026</b></div></div>
    <div id="pass-body"></div>
  </section>
</div>

<div class="sheet-bg" id="sheet-bg"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>

<nav class="tabbar">
  <button class="tab on" data-tab="home"><span class="ic">🏡</span>Home</button>
  <button class="tab" data-tab="courses"><span class="ic">🧭</span>Explore</button>
  <button class="tab" data-tab="pass"><span class="ic">🎫</span>Pass</button>
</nav>

<script>
/* ---------------- Fairway Freedom Pass — web app v1 (ClassPass-style redesign) ----
   Front-end prototype. State persists in localStorage (no backend yet).
   Model: $399/yr, 2 rounds at every course, 15% operator / 85% escrow, QR check-in.
------------------------------------------------------------------------------------ */
const PRICE = 399, ESCROW_PER_PASS = 339.15, ROUNDS_PER_COURSE = 2, AVG_GREEN_FEE = 55;

const COURSES = [
  { id:'c1',  name:'Cedar Hollow Links',     city:'Medina',        state:'OH', fee:48, blurb:'Rolling links-style muni with bentgrass greens and a famous walk-up burger.' },
  { id:'c2',  name:'Sandy Run Golf Club',    city:'Akron',         state:'OH', fee:42, blurb:'Family-run since 1961. Tight tree-lined par 70, generous senior rates.' },
  { id:'c3',  name:'Maple Ridge Country',    city:'Hudson',        state:'OH', fee:55, blurb:'Hidden gem with the best pro-shop coffee in the county.' },
  { id:'c4',  name:'Birch Creek Greens',     city:'Toledo',        state:'OH', fee:39, blurb:'Wide-open and beginner-friendly; lights for twilight nines.' },
  { id:'c5',  name:'Lakeside National',      city:'Sandusky',      state:'OH', fee:62, blurb:'Lake-breeze layout with five water holes and a killer patio.' },
  { id:'c6',  name:'Stonebrook Fairways',    city:'Ann Arbor',     state:'MI', fee:58, blurb:'Classic 1920s design, recently restored bunkering, walkable.' },
  { id:'c7',  name:'Whispering Pines',       city:'Traverse City', state:'MI', fee:67, blurb:'Northern-Michigan beauty tucked into the pines. Cart highly advised.' },
  { id:'c8',  name:'River Bend Club',        city:'Grand Rapids',  state:'MI', fee:51, blurb:'Two nines that play completely differently. Honest, fair, fun.' },
  { id:'c9',  name:'Heron Marsh Golf',       city:'Kalamazoo',     state:'MI', fee:44, blurb:'Low-key wetlands track; bring extra balls for the back nine.' },
  { id:'c10', name:'Pinehurst Commons',      city:'Asheville',     state:'NC', fee:64, blurb:'Mountain-view fairways and the friendliest starter in the Carolinas.' },
  { id:'c11', name:'Blue Ridge Run',         city:'Boone',         state:'NC', fee:59, blurb:'Elevation changes for days. Play it forward and enjoy the views.' },
  { id:'c12', name:'Catawba Valley Golf',    city:'Hickory',       state:'NC', fee:46, blurb:'Affordable everyday track that locals are fiercely loyal to.' },
  { id:'c13', name:'Tobacco Road Public',    city:'Sanford',       state:'NC', fee:71, blurb:'Bold, sandy, unforgettable. The bucket-lister of the network.' },
  { id:'c14', name:'Eagle Point Municipal',  city:'Columbus',      state:'OH', fee:38, blurb:'The best value in the network — and a perfect first-timer course.' },
];

/* Premium golf-landscape gradient "photos" (deterministic, always render) */
const PALETTES = [
  ['#bfe3f5','#dff3e3','#57b974','#1c7a48'],
  ['#cfe9f7','#e7f3df','#7cc585','#2c8a55'],
  ['#f6e6c4','#eef0d2','#97c47b','#3a8c55'],
  ['#cdeef0','#dff2ea','#62bd9c','#1c7a64'],
  ['#e0d6ef','#e9eede','#8cc083','#327646'],
  ['#ffe1c2','#f2ecd1','#a0c77c','#43864d'],
];
function idx(c){ return parseInt(c.id.slice(1)); }
function photoStyle(c){
  const p = PALETTES[idx(c)%PALETTES.length];
  return `background:radial-gradient(circle at 78% 24%, rgba(255,250,222,.0) 12%, rgba(255,250,222,0) 12%),`
       + `linear-gradient(180deg, ${p[0]} 0%, ${p[1]} 49%, ${p[2]} 50%, ${p[3]} 100%);`;
}
function ratingOf(c){ return (4.3 + (idx(c)*3 % 7)/10).toFixed(1); }
function photoEl(c, h){ return `<div class="photo" style="${photoStyle(c)}height:${h||''}"><div class="sun"></div><div class="hill"></div></div>`; }

/* ---- State ---- */
const KEY='ffp_v1';
let S = load();
function load(){ try{ return JSON.parse(localStorage.getItem(KEY))||fresh(); }catch{ return fresh(); } }
function fresh(){ return { member:null, used:{}, saved:{} }; }
function save(){ localStorage.setItem(KEY, JSON.stringify(S)); }

const usedAt = id => (S.used[id]||[]).length;
const totalRounds = () => Object.values(S.used).reduce((a,b)=>a+b.length,0);
const valueCaptured = () => totalRounds()*AVG_GREEN_FEE;

const $ = s => document.querySelector(s);
const money = n => '$'+n.toLocaleString('en-US',{maximumFractionDigits:0});
const money2 = n => '$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
let toastT; function toast(m){ const t=$('#toast'); t.textContent=m; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2400); }

function openSheet(html){ $('#sheet').innerHTML=html; $('#sheet-bg').classList.add('open'); document.body.style.overflow='hidden'; }
function closeSheet(){ $('#sheet-bg').classList.remove('open'); document.body.style.overflow=''; }
$('#sheet-bg').addEventListener('click',e=>{ if(e.target.id==='sheet-bg') closeSheet(); });

function go(tab){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  $('#screen-'+tab).classList.add('active');
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on', b.dataset.tab===tab));
  document.querySelectorAll('.tn-link').forEach(b=>b.classList.toggle('on', b.dataset.tab===tab));
  const tj=document.getElementById('tn-join'); if(tj) tj.textContent = S.member ? 'My Pass →' : 'Join · $399';
  window.scrollTo(0,0);
  if(tab==='courses') renderCourses();
  if(tab==='pass') renderPass();
  if(tab==='home') renderHome();
}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>go(b.dataset.tab));
document.querySelectorAll('.tn-link').forEach(b=>b.onclick=()=>go(b.dataset.tab));
document.getElementById('tn-join').onclick=()=>{ S.member ? go('pass') : openJoin(); };

/* ---- HOME ---- */
function renderHome(){
  const el=$('#screen-home');
  if(!S.member){
    const feat = COURSES.slice(0,6).map(c=>railCard(c)).join('');
    el.innerHTML = `
      <div class="hero">
        ${photoEl(COURSES[12],'100%')}
        <div class="scrim"></div>
        <div class="inner">
          <div class="eyebrow">Independent Course Co-op</div>
          <h1>Play local.<br/>One pass.</h1>
          <p>Two free 18-hole rounds at every independent, family-owned course in the network.</p>
          <div class="price"><b>${money(PRICE)}</b> / year · 2 rounds, every course</div>
        </div>
      </div>
      <div class="statband">
        <div class="s"><b>Hundreds</b><span>of independent courses</span></div>
        <div class="s"><b>2 rounds</b><span>free at every course</span></div>
        <div class="s"><b>${money(PRICE)}/yr</b><span>flat — no per-round fees</span></div>
      </div>
      <div class="section">
        <button class="btn" id="join-btn">Become a Founding Member</button>
        <button class="btn ghost mt14" id="browse-btn">Explore the courses</button>
      </div>
      <div class="section">
        <div class="eyebrow">How it works</div>
        <h2>Three steps to free rounds</h2>
        <div class="steps">
          <div class="step"><div class="num">1</div><div><b>Buy the pass</b><p>One flat annual fee. Lock in founding-member pricing.</p></div></div>
          <div class="step"><div class="num">2</div><div><b>Explore the network</b><p>Hundreds of independently owned public gems, coast to coast.</p></div></div>
          <div class="step"><div class="num">3</div><div><b>Show up &amp; play</b><p>Scan the pro-shop QR. Two free 18-hole rounds, every destination.</p></div></div>
        </div>
      </div>
      <div class="section">
        <div class="eyebrow">Featured courses</div>
        <h2>On the roster</h2>
      </div>
      <div class="rail">${feat}</div>
      <div class="section">
        <div class="eyebrow">The model</div>
        <h2>Where your ${money(PRICE)} goes</h2>
        <p class="sub">No course is paid upfront — zero risk. The pool distributes what's collected.</p>
        <div class="split">
          <div class="seg take"><div class="pct">15%</div><div class="amt">${money2(PRICE-ESCROW_PER_PASS)}</div><div class="lbl">Operations</div></div>
          <div class="seg escrow"><div class="pct">85%</div><div class="amt">${money2(ESCROW_PER_PASS)} / pass</div><div class="lbl">Locked in escrow — paid to courses at season's end, by rounds played</div></div>
        </div>
      </div>
      <p class="note pad mt20" style="padding-bottom:8px">Concept prototype · payout figures illustrative, based on consumer-breakage assumptions.</p>`;
    $('#join-btn').onclick=openJoin; $('#browse-btn').onclick=()=>go('courses');
    bindRail();
  } else {
    const t=totalRounds(), val=valueCaptured(), pct=Math.min(100,Math.round(val/PRICE*100));
    const next = COURSES.filter(c=>usedAt(c.id)<ROUNDS_PER_COURSE).slice(0,6).map(railCard).join('');
    el.innerHTML = `
      <div class="topbar"><div class="logo"><span class="mk">⛳</span> Fairway Freedom</div><div class="credits"><b>${ROUNDS_PER_COURSE*COURSES.length - t}</b> rounds left</div></div>
      <div class="section">
        <div class="eyebrow">Welcome back</div>
        <h2>Hi, ${S.member.name.split(' ')[0]} 👋</h2>
        <p class="sub">${t===0?"Your season's ready. Find a course and check in at the pro shop.":`You've played ${t} round${t>1?'s':''} so far this season.`}</p>
        <div class="progress">
          <div class="lab"><span>Pass value vs ${money(PRICE)} paid</span><span style="color:var(--green)">${pct}%</span></div>
          <div class="vbar mt8"><span style="width:${pct}%"></span></div>
          <p class="note mt8">${val>=PRICE?'🎉 Your pass has paid for itself.':`Play ${Math.max(0,Math.ceil((PRICE-val)/AVG_GREEN_FEE))} more round(s) to break even · ${money(val)} value captured.`}</p>
        </div>
        <button class="btn mt20" id="find-btn">Find a course to play</button>
      </div>
      <div class="section"><div class="eyebrow">Pick up where you left off</div><h2>Courses near the network</h2></div>
      <div class="rail">${next}</div>`;
    $('#find-btn').onclick=()=>go('courses');
    bindRail();
  }
}

/* ---- Cards ---- */
function railCard(c){
  const left=ROUNDS_PER_COURSE-usedAt(c.id);
  const badge = left>0?`<div class="badge">${left} left</div>`:`<div class="badge used">Played</div>`;
  return `<div class="ccard" data-id="${c.id}">
    <div class="photo" style="${photoStyle(c)}aspect-ratio:16/10"><div class="sun"></div><div class="hill"></div>${badge}</div>
    <div class="body">
      <div class="nm">${c.name}</div>
      <div class="loc">${c.city}, ${c.state}</div>
      <div class="meta"><span class="star">★ ${ratingOf(c)}</span><span class="dot">·</span><span class="fee">${money(c.fee)}</span></div>
    </div></div>`;
}
function ccard(c){
  const u=usedAt(c.id), left=ROUNDS_PER_COURSE-u;
  const badge = left===2?`<div class="badge">2 rounds free</div>`:left===1?`<div class="badge">1 round left</div>`:`<div class="badge used">Both played</div>`;
  return `<div class="ccard" data-id="${c.id}">
    <div class="photo" style="${photoStyle(c)}"><div class="sun"></div><div class="hill"></div>
      <div class="heart">${S.saved[c.id]?'♥':'♡'}</div>${badge}</div>
    <div class="body">
      <div class="nm">${c.name}</div>
      <div class="loc">${c.city}, ${c.state}</div>
      <div class="meta"><span class="star">★ ${ratingOf(c)}</span><span class="dot">·</span><span class="fee">~${money(c.fee)} green fee</span>
        ${left>0?`<span class="free">${left} free</span>`:''}</div>
    </div></div>`;
}
function bindRail(){ document.querySelectorAll('.rail .ccard, .courses .ccard').forEach(el=>el.onclick=()=>openCourse(el.dataset.id)); }

/* ---- JOIN ---- */
function openJoin(){
  openSheet(`
    <div class="shphoto" style="${photoStyle(COURSES[6])}"><div class="grab"></div><button class="close" onclick="closeSheet()">✕</button></div>
    <div class="shbody">
      <div class="ttl">Become a Founding Member</div>
      <div class="loc2">Lock in founding pricing — ${money(PRICE)} for the 2026 season.</div>
      <div class="formfield"><label>Your name</label><input id="j-name" placeholder="Jordan Fairway" /></div>
      <div class="formfield"><label>Email</label><input id="j-email" type="email" placeholder="you@email.com" /></div>
      <div class="ribbon"><div><div class="big">Annual Pass</div><div class="note">2 rounds at all ${COURSES.length}+ courses</div></div><div class="big">${money(PRICE)}</div></div>
      <button class="btn mt20" id="j-go">Activate my pass</button>
      <p class="note center mt14">Demo checkout — no real payment is taken.</p>
    </div>`);
  $('#j-go').onclick=()=>{
    const name=($('#j-name').value||'').trim(), email=($('#j-email').value||'').trim();
    if(name.length<2){ toast('Enter your name'); return; }
    if(!/.+@.+\..+/.test(email)){ toast('Enter a valid email'); return; }
    S.member={ name, email, id:'FFP-'+Math.random().toString(36).slice(2,7).toUpperCase()+'-26', joined:new Date().toISOString() };
    save(); closeSheet(); toast('🎉 Welcome to the network!'); renderHome();
  };
}

/* ---- COURSES ---- */
let filterState='ALL', filterText='';
function renderCourses(){
  $('#course-count').innerHTML = `<b>${COURSES.length}</b>&nbsp;courses`;
  const states=['ALL',...Array.from(new Set(COURSES.map(c=>c.state)))];
  $('#state-chips').innerHTML = states.map(s=>`<button class="chip ${s===filterState?'on':''}" data-st="${s}">${s==='ALL'?'All states':s}</button>`).join('');
  document.querySelectorAll('#state-chips .chip').forEach(c=>c.onclick=()=>{filterState=c.dataset.st;renderCourses();});
  const q=filterText.toLowerCase();
  const list=COURSES.filter(c=>(filterState==='ALL'||c.state===filterState)&&(!q||c.name.toLowerCase().includes(q)||c.city.toLowerCase().includes(q)));
  $('#course-list').innerHTML = list.length?list.map(ccard).join(''):`<p class="note pad mt14">No courses match. Try another search.</p>`;
  bindRail();
}
$('#search').addEventListener('input',e=>{filterText=e.target.value;renderCourses();});

/* ---- COURSE DETAIL + REDEEM ---- */
function openCourse(id){
  const c=COURSES.find(x=>x.id===id); if(!c) return;
  const left=ROUNDS_PER_COURSE-usedAt(id), member=!!S.member;
  openSheet(`
    <div class="shphoto" style="${photoStyle(c)}"><div class="grab"></div><button class="close" onclick="closeSheet()">✕</button></div>
    <div class="shbody">
      <div class="ttl">${c.name}</div>
      <div class="loc2">📍 ${c.city}, ${c.state} · ★ ${ratingOf(c)}</div>
      <p class="blurb">${c.blurb}</p>
      <div class="dstats">
        <div class="dstat"><div class="n">${left}</div><div class="l">Free rounds left here</div></div>
        <div class="dstat"><div class="n">${money(c.fee)}</div><div class="l">Walk-up green fee</div></div>
      </div>
      ${ member ? (left>0?`
        <button class="btn" id="redeem">Check in — redeem a round</button>
        <p class="note center mt14">At the course, scan the pro-shop QR placard to log your round.</p>`
        : `<div class="ribbon"><div><div class="big">Both rounds played</div><div class="note">Resets next season.</div></div><div style="font-size:24px">✓</div></div>`)
      : `<button class="btn" id="joinfirst">Join to unlock free rounds</button>` }
    </div>`);
  if(member&&left>0) $('#redeem').onclick=()=>confirmRedeem(c);
  if(!member) $('#joinfirst').onclick=openJoin;
}
function confirmRedeem(c){
  openSheet(`
    <div class="shphoto" style="${photoStyle(c)}height:140px"><div class="grab"></div><button class="close" onclick="closeSheet()">✕</button></div>
    <div class="shbody">
      <div class="ttl">Check in at ${c.name}?</div>
      <div class="loc2">This logs one of your two free rounds here.</div>
      <ul class="clean mt20">
        <li>You'll have <b>${ROUNDS_PER_COURSE-usedAt(c.id)-1} round</b> left here this season.</li>
        <li>Your round is tracked digitally toward the course's escrow check.</li>
        <li>You still pay $0 green fee — keep your cart &amp; pro-shop spend local.</li>
      </ul>
      <button class="btn mt24" id="do-redeem">Confirm check-in</button>
      <button class="btn outline mt14" id="cancel-redeem">Not yet</button>
    </div>`);
  $('#cancel-redeem').onclick=()=>openCourse(c.id);
  $('#do-redeem').onclick=()=>{
    (S.used[c.id]=S.used[c.id]||[]).push(new Date().toISOString()); save();
    const left=ROUNDS_PER_COURSE-usedAt(c.id);
    openSheet(`
      <div class="redeem-ok">
        <div class="ring">✓</div>
        <div class="ttl">Round logged!</div>
        <p class="sub" style="margin-top:8px">Enjoy ${c.name}. ${left>0?`You have ${left} round left here.`:'That was your last round here this season.'}</p>
        <div class="dstats" style="margin-top:20px">
          <div class="dstat"><div class="n">${totalRounds()}</div><div class="l">Total rounds played</div></div>
          <div class="dstat"><div class="n">${money(valueCaptured())}</div><div class="l">Value captured</div></div>
        </div>
        <p class="note">~${money(c.fee)} of green-fee value · your round feeds ${c.name}'s season-end escrow payout.</p>
        <button class="btn mt20" id="ok-done">Done</button>
      </div>`);
    $('#ok-done').onclick=()=>{ closeSheet(); renderCourses(); renderHome(); toast('⛳ Round added to your pass'); };
  };
}

/* ---- PASS ---- */
function renderPass(){
  const el=$('#pass-body');
  if(!S.member){
    el.innerHTML=`<div class="section center"><p class="sub mt20">You haven't joined yet.</p><button class="btn mt14" id="p-join">Become a Founding Member</button></div>`;
    $('#p-join').onclick=openJoin; return;
  }
  const m=S.member, t=totalRounds(), val=valueCaptured();
  el.innerHTML=`
    <div class="section">
      <div class="memcard">
        <div class="glow"></div>
        <div class="top">
          <div><div class="tier">Founding Member · 2026</div><div class="nm">${m.name}</div><div class="id">${m.id}</div></div>
          <div class="qr">${qrSvg(m.id)}</div>
        </div>
        <div class="foot">
          <div><div class="k">Rounds played</div><div class="v">${t}</div></div>
          <div><div class="k">Value captured</div><div class="v">${money(val)}</div></div>
          <div><div class="k">Pass</div><div class="v">${money(PRICE)}/yr</div></div>
        </div>
      </div>
      <p class="note center mt14">Show this QR at any course's pro shop to check in.</p>
    </div>
    <div class="section"><div class="eyebrow">Your season</div><h2>Round history</h2></div>
    <div class="courses" id="history"></div>
    <div class="section"><button class="btn outline" id="reset">Reset demo</button></div>`;
  const entries=[];
  Object.keys(S.used).forEach(id=>{ const c=COURSES.find(x=>x.id===id); if(c) S.used[id].forEach(d=>entries.push({c,d})); });
  entries.sort((a,b)=>new Date(b.d)-new Date(a.d));
  $('#history').innerHTML = entries.length ? entries.map(e=>`
    <div class="ccard" data-id="${e.c.id}" style="display:flex">
      <div class="photo" style="${photoStyle(e.c)}width:96px;flex:none;aspect-ratio:auto"><div class="sun"></div></div>
      <div class="body" style="flex:1"><div class="nm" style="font-size:16px">${e.c.name}</div>
        <div class="loc">${e.c.city}, ${e.c.state} · ${new Date(e.d).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>
        <div class="meta"><span class="free">+${money(e.c.fee)} value</span></div></div>
    </div>`).join('') : `<p class="note pad">No rounds yet. Head to Explore and check in at your first stop. ⛳</p>`;
  bindRail();
  $('#reset').onclick=()=>{ if(confirm('Reset the demo? This clears your pass and round history.')){ S=fresh(); save(); toast('Demo reset'); closeSheet(); go('home'); } };
}

function qrSvg(seed){
  let h=0; for(const ch of seed) h=(h*31+ch.charCodeAt(0))>>>0;
  const n=7,cell=50/n; let r='';
  for(let y=0;y<n;y++)for(let x=0;x<n;x++){ h=(h*1103515245+12345)>>>0;
    const corner=(x<2&&y<2)||(x>n-3&&y<2)||(x<2&&y>n-3);
    if(corner||((h>>16)&1)) r+=`<rect x="${x*cell}" y="${y*cell}" width="${cell}" height="${cell}" fill="#15140f"/>`; }
  return `<svg viewBox="0 0 50 50" width="100%" height="100%">${r}</svg>`;
}

window.closeSheet = closeSheet;
renderHome();
</script>
